# Configuration de la datasource PostgreSQL
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=greentrip
%prod.quarkus.datasource.password=greentrip_secure_password
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/greentrip

%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=greentrip
%dev.quarkus.datasource.password=greentrip_secure_password
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/greentrip

# Stratégie Hibernate ORM
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Activation d'OpenAPI et Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi

# Sécurisation par défaut de tous les chemins de l'API

quarkus.http.auth.permission.default.paths=/*
quarkus.http.auth.permission.default.policy=authenticated

# Autoriser Swagger UI et OpenAPI sans authentification en mode dev
quarkus.http.auth.permission.swagger.paths=/swagger-ui*,/openapi
quarkus.http.auth.permission.swagger.policy=permit

# Autoriser l'enregistrement et la connexion sans authentification
quarkus.http.auth.permission.public.paths=/api/users/register,/api/users/login
quarkus.http.auth.permission.public.policy=permit

# /me reste authentifie (plus specifique que la regle publique ci-dessous)
quarkus.http.auth.permission.companies-me.paths=/api/companies/me
quarkus.http.auth.permission.companies-me.policy=authenticated

# Autoriser la consultation publique d'une entreprise et du classement (endpoints @PermitAll)
quarkus.http.auth.permission.companies-get.paths=/api/companies/leaderboard,/api/companies/*
quarkus.http.auth.permission.companies-get.methods=GET
quarkus.http.auth.permission.companies-get.policy=permit

# PUT/DELETE sur /api/companies/{id} restent proteges (RolesAllowed ADMIN gere par l'annotation)
quarkus.http.auth.permission.companies-write.paths=/api/companies/*
quarkus.http.auth.permission.companies-write.methods=PUT,DELETE
quarkus.http.auth.permission.companies-write.policy=authenticated

# POST /api/companies (creation) reste protege : chemin exact, plus specifique que le wildcard ci-dessus
quarkus.http.auth.permission.companies-create.paths=/api/companies
quarkus.http.auth.permission.companies-create.methods=POST
quarkus.http.auth.permission.companies-create.policy=authenticated

# Configuration API Sirene (INSEE) - verification des numeros SIREN
sirene.api.base-url=https://api.insee.fr/api-sirene/3.11
sirene.api.key=${SIRENE_API_KEY:dummy_key}

# Configuration CORS pour le frontend
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173

# Configuration OAuth2 Strava - liaison du compte utilisateur
strava.client-id=${STRAVA_CLIENT_ID:dummy_client_id}
strava.client-secret=${STRAVA_CLIENT_SECRET:dummy_client_secret}
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:8080/api/strava/callback}
app.dashboard-url=${APP_DASHBOARD_URL:http://localhost:3000/dashboard}


quarkus.log.category."io.quarkus.security".level=DEBUG
%dev.quarkus.http.auth.permission.default.policy=permit