# Configuration de la datasource PostgreSQL
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=greentrip
%prod.quarkus.datasource.password=greentrip_secure_password
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/greentrip

%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=greentrip
%dev.quarkus.datasource.password=greentrip_secure_password
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/greentrip

# Stratégie Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Activation d'OpenAPI et Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi

# Sécurisation par défaut de tous les chemins de l'API
quarkus.http.auth.permission.default.paths=/*
quarkus.http.auth.permission.default.policy=authenticated

# Autoriser Swagger UI et OpenAPI sans authentification en mode dev
quarkus.http.auth.permission.swagger.paths=/swagger-ui*,/openapi
quarkus.http.auth.permission.swagger.policy=permit

# Autoriser l'enregistrement et la connexion sans authentification
quarkus.http.auth.permission.public.paths=/api/users/register,/api/users/login
quarkus.http.auth.permission.public.policy=permit

# Configuration API Sirene (INSEE) - verification des numeros SIREN
sirene.api.base-url=https://api.insee.fr/api-sirene/3.11
sirene.api.key=${SIRENE_API_KEY:dummy_key}
